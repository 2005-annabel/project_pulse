<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Pulse - Edit Progress Entry</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased min-h-screen flex flex-col justify-between">

    <nav class="bg-white border-b border-slate-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black text-lg shadow-md shadow-indigo-100">P</div>
                <span class="text-lg font-extrabold tracking-tight text-slate-900">Project<span class="text-indigo-600">Pulse</span></span>
            </div>
            <a href="{% url 'project_list' %}" class="inline-flex items-center text-sm font-bold text-slate-500 hover:text-slate-800 transition">
                <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                Return to Station
            </a>
        </div>
    </nav>

    <main class="max-w-2xl w-full mx-auto px-6 py-12 flex-grow">
        <div class="bg-white border border-slate-200 rounded-2xl p-8 shadow-sm">
            <div class="mb-8">
                <span class="text-xs font-bold uppercase tracking-wider text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-lg">Matrix Modifier</span>
                <h1 class="text-2xl font-extrabold tracking-tight text-slate-900 mt-3">Amend Progress Milestone</h1>
                <p class="text-sm text-slate-400 mt-1">Modifying update logging entity attached to user account <span class="text-slate-600 font-semibold">@{{ update.user.username }}</span>.</p>
            </div>

            <form method="post" class="space-y-6">
                {% csrf_token %}
                
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">Action Executed / Task Done</label>
                    <input type="text" name="task_done" value="{{ update.task_done }}" required 
                           class="w-full px-4 py-2.5 bg-slate-50/50 border border-slate-200 focus:border-indigo-500 focus:bg-white text-slate-800 font-medium rounded-xl text-sm transition focus:outline-none">
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">Discrete Operational Details</label>
                    <textarea name="details" rows="5" required 
                              class="w-full px-4 py-2.5 bg-slate-50/50 border border-slate-200 focus:border-indigo-500 focus:bg-white text-slate-800 text-sm rounded-xl transition focus:outline-none leading-relaxed">{{ update.details }}</textarea>
                </div>

                <div class="pt-4 border-t border-slate-100 flex items-center justify-end space-x-3">
                    <a href="{% url 'project_list' %}" class="px-5 py-2.5 text-sm font-semibold text-slate-500 hover:text-slate-800 hover:bg-slate-50 rounded-xl border border-transparent transition">
                        Cancel Modification
                    </a>
                    <button type="submit" class="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm rounded-xl shadow-md shadow-indigo-100 hover:shadow-indigo-200 transition duration-150 cursor-pointer">
                        Commit Changes
                    </button>
                </div>
            </form>
        </div>
    </main>

    <footer class="text-center py-6 text-xs font-semibold text-slate-400 tracking-wider uppercase">
        Project Pulse Core Engine Server Runtime v6.0.6
    </footer>

</body>
</html>
