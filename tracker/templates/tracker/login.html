<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Pulse - Sign In</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen antialiased">

    <div class="max-w-md w-full bg-white border border-slate-200 rounded-2xl p-8 shadow-sm">
        <div class="flex items-center space-x-3 mb-6 justify-center">
            <div class="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black text-lg shadow-md">P</div>
            <span class="text-xl font-extrabold tracking-tight text-slate-900">Project<span class="text-indigo-600">Pulse</span></span>
        </div>

        <h2 class="text-center text-lg font-bold text-slate-800 mb-6">Authenticate Session</h2>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1">Username</label>
                <input type="text" name="username" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-indigo-600">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1">Password</label>
                <input type="password" name="password" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-indigo-600">
            </div>
            
            <button type="submit" class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm rounded-xl shadow-lg shadow-indigo-100 transition duration-200 cursor-pointer mt-2">
                Sign In
            </button>
        </form>

        <div class="mt-6 pt-4 border-t border-slate-100 text-center">
            <p class="text-xs text-slate-400">Need a profile layout? <a href="{% url 'signup' %}" class="text-indigo-600 font-bold hover:underline">Create an Account</a></p>
        </div>
    </div>

</body>
</html>
