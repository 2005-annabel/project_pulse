<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Alert System Dispatcher</title>
<script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-xl shadow-md border max-w-md w-full mx-4">
        <h2 class="text-xl font-bold text-gray-900 mb-2">Composing Control Message</h2>
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Target Audience</label>
                {{ form.recipient }}
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Message Content</label>
                {{ form.message }}
            </div>
            <div class="flex justify-end space-x-3">
                <a href="{% url 'project_list' %}" class="px-4 py-2 border rounded-lg text-gray-700">Cancel</a>
                <button type="submit" class="px-5 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg font-medium shadow">Send Out Message</button>
            </div>
        </form>
    </div>
</body>
</html>
