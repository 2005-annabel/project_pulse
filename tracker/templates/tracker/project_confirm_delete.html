<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete Project - ProjectPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-xl shadow-md border max-w-md w-full mx-4 text-center">
        <div class="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        </div>
        <h2 class="text-xl font-bold text-gray-900 mb-2">Delete Project?</h2>
        <p class="text-gray-500 mb-6">Are you sure you want to delete <span class="font-semibold text-gray-800">"{{ project.title }}"</span>? This destructive action cannot be undone.</p>
        
        <form method="POST" class="flex justify-center space-x-3">
            {% csrf_token %}
            <a href="{% url 'project_list' %}" class="px-4 py-2 border rounded-lg text-gray-700 hover:bg-gray-50 transition">No, Cancel</a>
            <button type="submit" class="px-5 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg font-medium transition">
                Yes, Delete
            </button>
        </form>
    </div>
</body>
</html>
