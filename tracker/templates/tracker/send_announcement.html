<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Pulse - Dispatch System Alert</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 antialiased min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-white border border-slate-200 rounded-2xl p-8 shadow-sm">
        <h1 class="text-xl font-black text-slate-900 tracking-tight mb-2">Dispatch System Alert</h1>
        <p class="text-xs text-rose-600 mb-6 uppercase font-bold tracking-wider">Broadcast Directive Pipeline</p>
        
        <form method="post" class="space-y-4">
            {% csrf_token %}
            
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1">Target Recipient</label>
                <select name="recipient" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-rose-600 font-medium text-slate-700">
                    <option value="">Everyone (Whole Group Broadcast)</option>
                    {% for user in users %}
                        <option value="{{ user.id }}">@{{ user.username }} {% if user.is_superuser %}(Supervisor){% endif %}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1">Broadcast Directive Message</label>
                <textarea name="message" rows="4" placeholder="Enter instructions or announcements..." required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-rose-600"></textarea>
            </div>

            <div class="flex space-x-3 pt-2">
                <a href="{% url 'project_list' %}" class="w-1/2 py-2.5 text-center text-sm font-bold text-slate-500 hover:bg-slate-100 rounded-xl transition">Cancel</a>
                <button type="submit" class="w-1/2 py-2.5 bg-rose-600 hover:bg-rose-700 text-white font-bold text-sm rounded-xl shadow-md transition cursor-pointer">Transmit Alert</button>
            </div>
        </form>
    </div>
</body>
</html>
