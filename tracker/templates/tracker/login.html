<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>ProjectPulse Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-800 to-gray-900 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full mx-4">
        <h2 class="text-3xl font-extrabold text-gray-900 text-center mb-2">Welcome Back</h2>
        <p class="text-center text-gray-500 text-sm mb-6">Access your project tracker workstation</p>
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-bold uppercase text-gray-600 mb-1">Username</label>
                <input type="text" name="username" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-gray-600 mb-1">Password</label>
                <input type="password" name="password" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="submit" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-semibold shadow transition">Sign In</button>
        </form>
        <p class="text-center text-sm text-gray-500 mt-6">New developer? <a href="{% url 'signup' %}" class="text-indigo-600 hover:underline font-medium">Create Account</a></p>
    </div>
</body>
</html>
