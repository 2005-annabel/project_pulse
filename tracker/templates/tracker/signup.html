<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Join ProjectPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-600 to-indigo-900 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full mx-4">
        <h2 class="text-3xl font-extrabold text-gray-900 text-center mb-2">Create Account</h2>
        <p class="text-center text-gray-500 text-sm mb-6">Get started tracking your milestones</p>
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            {% for field in form %}
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-600 mb-1">{{ field.label }}</label>
                    {{ field }}
                </div>
            {% endfor %}
            <button type="submit" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-semibold shadow transition">Register</button>
        </form>
        <p class="text-center text-sm text-gray-500 mt-6">Already have an account? <a href="{% url 'login' %}" class="text-blue-600 hover:underline font-medium">Sign In</a></p>
    </div>
</body>
</html>
