<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title }} - ProjectPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-xl shadow-md border max-w-lg w-full mx-4">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">{{ title }}</h2>
        
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            
            {% for field in form %}
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">{{ field.label }}</label>
                    {{ field }}
                </div>
            {% endfor %}
            
            <div class="flex justify-end space-x-3 pt-4">
                <a href="{% url 'project_list' %}" class="px-4 py-2 border rounded-lg text-gray-700 hover:bg-gray-50 transition">Cancel</a>
                <button type="submit" class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium shadow transition">
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</body>
</html>
